name: Update Access and Deploy

on:
  schedule:
    - cron: "17 3,15 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "access/index.html"
      - "access/update_hub.py"
      - ".github/workflows/update.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: access-pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install feedparser google-genai requests

      - name: Discover and curate opportunities
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_DISCOVERY_MODEL: gemini-3.5-flash
          GEMINI_CURATOR_MODEL: gemini-3.5-flash
          MAX_FINAL_ITEMS: "100"
        run: python access/update_hub.py

      - name: Validate data.json
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("access/data.json")
          data = json.loads(path.read_text(encoding="utf-8"))
          assert isinstance(data, list), "data.json must be an array"
          assert 10 <= len(data) <= 100, "Expected between 10 and 100 curated records"
          allowed = {"Funding", "Event", "Advisor", "Learning", "Tool"}
          for i, item in enumerate(data):
              required = {
                  "title", "category", "subcategory", "description", "link",
                  "source", "first_seen", "last_seen"
              }
              assert required <= set(item), f"Missing fields at {i}: {required - set(item)}"
              assert item["category"] in allowed, f"Invalid category at {i}"
              assert item["link"].startswith(("https://", "http://")), f"Invalid link at {i}"
          print(f"Validated {len(data)} records")
          PY

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add access/data.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore(access): refresh opportunities"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v4
        with:
          path: "."

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
